<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Thunder Map Viewer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%234dabf7'/%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: #0a1628; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #canvas { position: fixed; inset: 0; display: block; width: 100vw; height: 100vh; }

  #panel {
    position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
    background: rgba(10, 18, 36, 0.95); backdrop-filter: blur(8px);
    border-right: 1px solid #1e3a5f; overflow-y: auto; z-index: 10;
    padding: 16px; transition: transform 0.3s;
  }
  #panel.collapsed { transform: translateX(-280px); }
  #panel h1 { font-size: 16px; color: #4dabf7; margin-bottom: 4px; }
  #panel .subtitle { font-size: 11px; color: #667; margin-bottom: 12px; }
  #map-head {
    position: relative;
    margin-bottom: 12px;
  }
  #map-head #map-subtitle {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin: 0;
    padding: 6px 10px 8px;
    text-align: center;
    color: #cfe1ff;
    font-size: 11px;
    line-height: 1.3;
    text-shadow:
      0 0 6px rgba(0, 0, 0, 0.85),
      0 1px 2px rgba(0, 0, 0, 0.95);
    pointer-events: none;
    z-index: 2;
  }
  #panel h2 {
    font-size: 11px; color: #556; text-transform: uppercase;
    letter-spacing: 1.5px; margin: 16px 0 8px;
    padding-bottom: 4px; border-bottom: 1px solid #1e3a5f;
  }

  .ctrl-row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 0; font-size: 12px;
  }
  .ctrl-row label { flex: 1; cursor: pointer; }
  .ctrl-row input[type="checkbox"] {
    width: 15px; height: 15px; accent-color: #4dabf7; cursor: pointer;
  }
  .ctrl-row input[type="range"] {
    width: 80px; height: 3px; accent-color: #4dabf7; cursor: pointer;
  }
  .ctrl-row .val { font-size: 10px; color: #556; width: 32px; text-align: right; }

  #coord-info {
    margin-top: 12px; padding: 8px; background: rgba(30, 58, 95, 0.3);
    border-radius: 6px; font-size: 10px; color: #667; line-height: 1.6;
  }
  #coord-info .v { color: #aac; }


  #toggle-panel {
    position: fixed; top: 10px; left: 10px; z-index: 11;
    background: rgba(10, 18, 36, 0.9); border: 1px solid #1e3a5f;
    color: #4dabf7; padding: 6px 10px; border-radius: 6px; cursor: pointer;
    font-size: 18px; line-height: 1; transition: left 0.3s;
  }
  #toggle-panel.shifted { left: 292px; }

  #status {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(10, 18, 36, 0.9); padding: 6px 16px;
    border-radius: 20px; font-size: 11px; color: #556; border: 1px solid #1e3a5f;
  }

  #hover-coords {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: rgba(10, 18, 36, 0.92); padding: 5px 14px;
    border-radius: 16px; font-size: 11px; color: #8ab; border: 1px solid #1e3a5f;
    pointer-events: none; white-space: nowrap; display: none;
    line-height: 1.35;
  }
  #tile-lc-popup {
    position: fixed; display: none; z-index: 21;
    background: rgba(8, 14, 30, 0.96); border: 1px solid #1e3a5f;
    border-radius: 8px; padding: 8px 10px;
    font-size: 11px; color: #9fb3cc; line-height: 1.35;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
    pointer-events: none; max-width: min(420px, 70vw);
  }
  #tile-lc-popup .tl-row { display: flex; align-items: center; gap: 6px; }
  #tile-lc-popup .swatch {
    width: 10px; height: 10px; border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0;
  }
  #hover-coords .label { color: #556; }
  #hover-coords .val { color: #4dabf7; font-weight: 600; }

  #zoom-bar {
    position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
    z-index: 10; display: flex; flex-direction: column; align-items: center;
    gap: 6px; background: rgba(10, 18, 36, 0.9); border: 1px solid #1e3a5f;
    border-radius: 8px; padding: 10px 6px;
  }
  #zoom-bar .zoom-label { font-size: 14px; color: #4dabf7; font-weight: 700; user-select: none; }
  #zoom-bar input[type="range"] {
    writing-mode: vertical-lr;
    direction: rtl;
    appearance: slider-vertical;
    width: 24px; height: 180px;
    accent-color: #4dabf7; cursor: pointer;
    -webkit-appearance: slider-vertical;
  }

  #axis-gizmo {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: 100px; height: 100px; pointer-events: none;
  }

  #earth-globe-container {
    position: relative;
    display: none;
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: transparent;
    overflow: hidden;
    padding: 0;
    margin: 0;
    z-index: 1;
  }
  #earth-globe {
    width: 100%;
    height: 100%;
    display: block;
    border-radius: 50%;
  }

  #loading {
    position: fixed; inset: 0; background: #0a1628; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; font-size: 14px; color: #667;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #1e3a5f;
    border-top-color: #4dabf7; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress { width: 220px; height: 4px; background: #1e3a5f; border-radius: 2px; }
  .progress-fill { height: 100%; background: #4dabf7; border-radius: 2px; transition: width 0.15s; }

  #lc-tooltip {
    display: none; position: fixed; left: 292px; width: 260px;
    background: rgba(8, 14, 30, 0.98); border: 1px solid #1e3a5f;
    border-radius: 8px; padding: 12px; z-index: 20; pointer-events: none;
    backdrop-filter: blur(10px); box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    max-height: 90vh; overflow-y: auto;
  }
  #lc-tooltip .tt-img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 4px; border: 1px solid #1e3a5f; display: block; margin-bottom: 10px;
  }
  #lc-tooltip .tt-title { font-size: 14px; font-weight: 600; color: #aac; margin-bottom: 4px; }
  #lc-tooltip .tt-tex  { font-size: 10px; color: #556; margin-bottom: 8px; word-break: break-all; }
  #lc-tooltip .tt-sep  { border: none; border-top: 1px solid #1e3a5f; margin: 8px 0; }
  #lc-tooltip .tt-comp { display: flex; align-items: center; gap: 8px; font-size: 11px; margin: 4px 0; }
  #lc-tooltip .tt-cn   { color: #aac; }
  #mat-tooltip {
    display: none; position: fixed; left: 292px; width: 240px;
    background: rgba(8, 14, 30, 0.98); border: 1px solid #1e3a5f;
    border-radius: 8px; padding: 10px; z-index: 20; pointer-events: none;
    backdrop-filter: blur(10px); box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  }
  #mat-tooltip img { width: 100%; border-radius: 4px; border: 1px solid #1e3a5f; display: block; margin-bottom: 6px; }
  #mat-tooltip .mt-name { font-size: 11px; font-weight: 600; color: #aac; margin-bottom: 2px; }
  #mat-tooltip .mt-dim  { font-size: 10px; color: #667; }

  /* Tool buttons */
  #tool-bar {
    position: fixed; bottom: 40px; right: 16px; z-index: 11;
    display: flex; flex-direction: column; gap: 6px;
  }
  .tool-btn {
    width: 38px; height: 38px; border-radius: 8px;
    background: rgba(10, 18, 36, 0.92); border: 1px solid #1e3a5f;
    color: #4dabf7; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tool-btn:hover { background: rgba(30, 58, 95, 0.7); }
  .tool-btn.active { border-color: #4dabf7; background: rgba(30, 80, 140, 0.6); color: #fff; }
  .tool-btn svg { width: 20px; height: 20px; fill: currentColor; }

  /* Ruler labels in 3D */
  .ruler-label {
    position: absolute; pointer-events: none; z-index: 15;
    background: rgba(10, 18, 36, 0.9); border: 1px solid #4dabf7;
    border-radius: 4px; padding: 2px 6px; font-size: 11px;
    color: #4dabf7; font-weight: 600; white-space: nowrap;
  }

  #gpu-badge {
    position: fixed; top: 10px; right: 60px; z-index: 11;
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    border: 1px solid #1e3a5f; background: rgba(10, 18, 36, 0.9);
    color: #556; pointer-events: none; font-family: 'Segoe UI', system-ui, sans-serif;
    transition: color 0.3s, border-color 0.3s;
  }
  #gpu-badge.active { color: #2dd4bf; border-color: #2dd4bf; }

  /* Mission UI */
  #missions-section { display: none; }
  .mission-radio-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px; font-size: 12px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
    border: 1px solid #1e3a5f; margin: 3px 0;
    background: rgba(30, 58, 95, 0.15);
    width: 100%;
  }
  .mission-radio-row:hover { 
    background: rgba(30, 58, 95, 0.4); 
    border-color: #4dabf7;
  }
  .mission-radio-row.selected {
    background: rgba(255, 136, 0, 0.2);
    border-color: #ff9f2e;
    box-shadow: inset 0 0 0 1px rgba(255, 159, 46, 0.35);
  }
  .mission-radio-row.selected label,
  .mission-radio-row.selected .mission-count { color: #ffd3a0; }
  .mission-radio-row input[type="radio"] {
    display: none;
  }
  .mission-radio-row label { cursor: pointer; flex: 1; color: #aac; font-weight: 500; }
  .mission-radio-row .mission-count { font-size: 10px; color: #778; margin-left: auto; }
  .mission-mode-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; font-size: 11px; margin-top: 8px;
    background: rgba(30, 58, 95, 0.2); border-radius: 6px; border: 1px solid #1e3a5f;
  }
  .mission-mode-row input[type="radio"] {
    display: none;
  }
  .mission-mode-row label {
    cursor: pointer; color: #aac; font-weight: 600; padding: 3px 8px;
    border-radius: 4px; border: 1px solid transparent;
  }
  .mission-mode-row input[type="radio"]:checked + label {
    background: rgba(255, 136, 0, 0.2);
    border-color: #ff9f2e;
    color: #ffd3a0;
  }
  .mission-legend {
    display: flex; flex-wrap: wrap; gap: 8px; font-size: 10px;
    padding: 6px 0; color: #667; margin-top: 6px;
    border-top: 1px solid rgba(30, 58, 95, 0.4);
  }
  .mission-legend-item { display: flex; align-items: center; gap: 4px; }
  .mission-legend-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="load-text">Loading map data...</div>
  <div class="progress"><div class="progress-fill" id="progress-bar"></div></div>
</div>

<a id="back-btn" href="index.html" title="Back to map list" style="position:fixed;top:10px;right:14px;z-index:11;background:rgba(10,18,36,0.9);border:1px solid #1e3a5f;color:#4dabf7;padding:6px 12px;border-radius:6px;text-decoration:none;font-size:12px;display:none;">&larr; Maps</a>
<div id="gpu-badge">CPU</div>
<button id="toggle-panel" class="shifted" title="Toggle panel">&#9776;</button>
<div id="panel">
  <h1 id="map-title">Map Viewer</h1>
  <div id="map-head">
    <div id="earth-globe-container" title="Map geolocation">
      <canvas id="earth-globe" width="440" height="440"></canvas>
    </div>
    <div class="subtitle" id="map-subtitle"></div>
  </div>

  <h2>Layers</h2>
  <div class="ctrl-row" id="row-rendinst" style="display:none">
    <input type="checkbox" id="cb-rendinst" checked>
    <label for="cb-rendinst">Objects</label>
    <input type="range" id="sl-rendinst" min="1" max="100" value="100">
  </div>
  <div id="object-types-panel" style="display:none;padding:6px 0 2px 22px;">
    <div class="ctrl-row" style="padding:2px 0;gap:6px;">
      <button id="btn-obj-enable-all" style="flex:1;background:#0f1f35;border:1px solid #1e3a5f;color:#4dabf7;border-radius:4px;padding:4px 6px;cursor:pointer;font-size:10px;">Enable All</button>
      <button id="btn-obj-disable-all" style="flex:1;background:#0f1f35;border:1px solid #1e3a5f;color:#ff7b7b;border-radius:4px;padding:4px 6px;cursor:pointer;font-size:10px;">Disable All</button>
    </div>
    <div class="ctrl-row" style="padding:2px 0;">
      <button id="btn-real-objects" style="width:100%;background:#0f1f35;border:1px solid #1e3a5f;color:#d9b56a;border-radius:4px;padding:4px 6px;cursor:pointer;font-size:10px;">Load Real 3D Objects (experimental)</button>
    </div>
    <div id="object-types-list" style="display:flex;flex-direction:column;gap:3px;padding-top:2px;"></div>
  </div>
  <div class="ctrl-row" id="row-tilegrid" style="display:none">
    <input type="checkbox" id="cb-tilegrid" checked>
    <label for="cb-tilegrid">Texture</label>
    <input type="range" id="sl-tilegrid" min="0" max="100" value="100">
  </div>
  <div class="ctrl-row" id="row-heightmap" style="display:none">
    <input type="checkbox" id="cb-heightmap">
    <label for="cb-heightmap">Heightmap</label>
    <input type="range" id="sl-heightmap" min="0" max="100" value="80">
  </div>
  <div class="ctrl-row" id="row-water">
    <input type="checkbox" id="cb-water" checked>
    <label for="cb-water">Ocean</label>
    <input type="range" id="sl-water" min="0" max="100" value="100">
  </div>
  <div class="ctrl-row" id="row-tankzone" style="display:none">
    <input type="checkbox" id="cb-tankzone" checked>
    <label for="cb-tankzone">Battle Zone</label>
  </div>
  <div class="ctrl-row" id="row-splatmap" style="display:none">
    <input type="checkbox" id="cb-splatmap">
    <label for="cb-splatmap">Tile Grid</label>
    <input type="range" id="sl-splatmap" min="0" max="100" value="100">
  </div>
  <div class="ctrl-row" id="row-colormap" style="display:none">
    <input type="checkbox" id="cb-colormap">
    <label for="cb-colormap">Overview Map</label>
    <input type="range" id="sl-colormap" min="0" max="100" value="80">
  </div>

  <div id="missions-section">
    <h2>Missions</h2>
    <div id="mission-active" style="font-size:10px;color:#778;padding:2px 0 6px;">Active: None</div>
    <div id="mission-list"></div>
    <div class="mission-mode-row" id="mission-mode-row" style="display:none">
      <input type="radio" name="mmode" id="mmode-arcade" value="arcade">
      <label for="mmode-arcade">Arcade</label>
      <input type="radio" name="mmode" id="mmode-hardcore" value="hardcore" checked>
      <label for="mmode-hardcore">Realistic</label>
    </div>
    <div class="mission-legend" id="mission-legend" style="display:none">
      <span class="mission-legend-item"><span class="mission-legend-dot" style="background:#4dabf7"></span> Team 1</span>
      <span class="mission-legend-item"><span class="mission-legend-dot" style="background:#ff4444"></span> Team 2</span>
      <span class="mission-legend-item"><span class="mission-legend-dot" style="background:#ffd700;border-radius:2px;width:10px;height:10px"></span> Capture</span>
      <span class="mission-legend-item"><span class="mission-legend-dot" style="background:rgba(0,217,255,0.5);border-radius:2px;width:10px;height:10px"></span> Battle Area</span>
    </div>
  </div>

  <h2>Terrain</h2>
  <div class="ctrl-row" id="row-height">
    <label>Height Scale</label>
    <input type="range" id="sl-height" min="1" max="400" value="100">
    <span class="val" id="val-height">100%</span>
  </div>

  <div id="coord-info"></div>
  <h2 id="h2-landclasses" style="display:none">Land Classes</h2>
  <div id="landclasses" style="display:none"></div>

  <h2 id="h2-materials">Materials</h2>
  <div id="materials"></div>


</div>

<div id="lc-tooltip"></div>
<div id="mat-tooltip"></div>

<canvas id="canvas"></canvas>
<div id="zoom-bar">
  <div class="zoom-label">+</div>
  <input type="range" id="sl-zoom" min="0" max="100" value="50" orient="vertical">
  <div class="zoom-label">&minus;</div>
</div>
<div id="hover-coords"></div>
<div id="tile-lc-popup"></div>
<div id="status">Scroll: zoom &middot; Drag: rotate &middot; Right-drag: pan</div>
<div id="axis-gizmo"><canvas id="gizmo-canvas" width="100" height="100"></canvas></div>

<!-- Tool bar -->
<div id="tool-bar">
  <button class="tool-btn" id="btn-ruler" title="Ruler (measure distance)">
    <svg viewBox="0 0 24 24"><path d="M1.39 18.36l3.16-3.16 1.41 1.41-2.75 2.75h16.17l-2.75-2.75 1.41-1.41 3.16 3.16a1 1 0 010 1.41l-.71.71a1 1 0 01-1.41 0L1.39 19.77a1 1 0 010-1.41zM5.93 8.36l2.83-2.83 1.41 1.41L7.34 9.77l1.41 1.41 1.42-1.41 1.41 1.41-1.42 1.42 1.42 1.41 2.83-2.83 1.41 1.41-2.83 2.83 1.42 1.42 1.41-1.42 1.41 1.41-1.41 1.42 1.41 1.41 2.83-2.83 1.41 1.41-7.07 7.07L5.93 8.36z"/></svg>
  </button>
  <button class="tool-btn" id="btn-los" title="Line of Sight (1.0 km)">
    <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
  </button>
  <button class="tool-btn" id="btn-tile" title="Show tile grid cell on hover">
    <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
  </button>
</div>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module" src="web/viewer-app.js"></script>
</body>
</html>
